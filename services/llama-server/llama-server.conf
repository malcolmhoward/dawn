# Quality: 89.7% (B) | AGX Orin 64GB MAXN: 36.3 tok/s | Orin 16GB 28W: 13.9 tok/s
# No thinking leak (unlike Gemma 4). Tested on both Orin platforms.
# Download:
#   hf download bartowski/google_gemma-3-4b-it-GGUF google_gemma-3-4b-it-Q4_K_M.gguf --local-dir /var/lib/llama-cpp/models/
#   hf download bartowski/google_gemma-3-4b-it-GGUF mmproj-google_gemma-3-4b-it-f16.gguf --local-dir /var/lib/llama-cpp/models/
#MODEL="/var/lib/llama-cpp/models/google_gemma-3-4b-it-Q4_K_M.gguf"
