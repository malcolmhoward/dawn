# Llama.cpp Server Configuration for DAWN
# Updated: April 2025
#
# See README.md for full documentation
#
# IMPORTANT: Set power mode to MAXN for best performance on AGX Orin 64GB:
#   sudo nvpmodel -m 0 && sudo jetson_clocks

# ==============================================================================
# MODEL SELECTION - Choose ONE preset by uncommenting MODEL and REASONING_FORMAT
# ==============================================================================

# --- PRESET A: Standard Instruct (default) ---
# Fast responses, no visible reasoning. Best for voice without vision.
# Quality: 84.8% (B) | AGX Orin 64GB MAXN: 35.5 tok/s | 30W: 10.4 tok/s
MODEL="/var/lib/llama-cpp/models/Qwen3-4B-Instruct-2507-Q4_K_M.gguf"
TEMPLATE="/var/lib/llama-cpp/templates/qwen3_chatml.jinja"
REASONING_FORMAT=none
MMPROJ=

# --- PRESET B: Extended Thinking ---
# Shows AI reasoning process. Slower but transparent.
# Uncomment these 4 lines and comment out Preset A above:
#MODEL="/var/lib/llama-cpp/models/Qwen3-4B-Thinking-2507-Q4_K_M.gguf"
#TEMPLATE="/var/lib/llama-cpp/templates/qwen3_official.jinja"
#REASONING_FORMAT=deepseek
#MMPROJ=

# --- PRESET C: Higher Quality (8B) ---
# Better quality but slower (~4 tok/s).
#MODEL="/var/lib/llama-cpp/models/Qwen3-8B-Q4_K_M.gguf"
#TEMPLATE="/var/lib/llama-cpp/templates/qwen3_chatml.jinja"
#REASONING_FORMAT=none
#MMPROJ=

# --- PRESET D: Gemma 4 31B Vision (AGX Orin 64GB) ---
# Multimodal (text + vision), high quality, uses built-in chat template.
# Requires ~18.2GB model + ~1.1GB mmproj. Context 32768 leaves headroom
# for concurrent image generation (stable-diffusion.cpp).
# NOTE: Thinking content leaks into responses even with deepseek format.
# AGX Orin 64GB MAXN: 6.8 tok/s | 30W: 2.1 tok/s — WebUI only, not voice.
# Download:
#   hf download bartowski/google_gemma-4-31B-it-GGUF google_gemma-4-31B-it-Q4_K_M.gguf --local-dir /var/lib/llama-cpp/models/
#   hf download bartowski/google_gemma-4-31B-it-GGUF mmproj-google_gemma-4-31B-it-f16.gguf --local-dir /var/lib/llama-cpp/models/
#MODEL="/var/lib/llama-cpp/models/google_gemma-4-31B-it-Q4_K_M.gguf"
#TEMPLATE=
#REASONING_FORMAT=deepseek
#MMPROJ="/var/lib/llama-cpp/models/mmproj-google_gemma-4-31B-it-f16.gguf"

# --- PRESET E: Qwen 3.5 27B Vision, dense (AGX Orin 64GB) ---
# Multimodal (text + vision), hybrid SSM+Transformer, Apache 2.0.
# Requires ~15.9GB model + ~0.9GB mmproj. Context 32768 leaves headroom
# for concurrent image generation (stable-diffusion.cpp).
# Clean thinking disable via built-in template.
# AGX Orin 64GB MAXN: 7.2 tok/s | 30W: 2.1 tok/s — WebUI only, not voice.
# Download:
#   hf download bartowski/Qwen_Qwen3.5-27B-GGUF Qwen_Qwen3.5-27B-Q4_K_M.gguf --local-dir /var/lib/llama-cpp/models/
#   hf download bartowski/Qwen_Qwen3.5-27B-GGUF mmproj-Qwen_Qwen3.5-27B-f16.gguf --local-dir /var/lib/llama-cpp/models/
#MODEL="/var/lib/llama-cpp/models/Qwen_Qwen3.5-27B-Q4_K_M.gguf"
#TEMPLATE=
#REASONING_FORMAT=deepseek
#MMPROJ="/var/lib/llama-cpp/models/mmproj-Qwen_Qwen3.5-27B-f16.gguf"

# --- PRESET F: Qwen 3.5 35B-A3B Vision, MoE (AGX Orin 64GB) ⭐ RECOMMENDED ---
# Multimodal (text + vision), MoE (256 experts, 8 active, ~3B active params),
# hybrid SSM+Transformer, Apache 2.0. Best balance of speed + quality + vision.
# Requires ~19.9GB model + ~0.9GB mmproj. Context 32768 leaves headroom
# for concurrent image generation (stable-diffusion.cpp).
# Clean thinking disable via built-in template.
# Quality: 93.3% (A) | AGX Orin 64GB MAXN: 29.6 tok/s — voice-viable with vision!
# Download:
#   hf download bartowski/Qwen_Qwen3.5-35B-A3B-GGUF Qwen_Qwen3.5-35B-A3B-Q4_K_M.gguf --local-dir /var/lib/llama-cpp/models/
#   hf download bartowski/Qwen_Qwen3.5-35B-A3B-GGUF mmproj-Qwen_Qwen3.5-35B-A3B-f16.gguf --local-dir /var/lib/llama-cpp/models/
#MODEL="/var/lib/llama-cpp/models/Qwen_Qwen3.5-35B-A3B-Q4_K_M.gguf"
#TEMPLATE=
#REASONING_FORMAT=deepseek
#MMPROJ="/var/lib/llama-cpp/models/mmproj-Qwen_Qwen3.5-35B-A3B-f16.gguf"

# --- PRESET G: Gemma 4 26B-A4B Vision, MoE (AGX Orin 64GB) --- PENDING FIX ---
# Multimodal (text + vision), MoE (128 experts, 8 active, ~4B active params),
# Apache 2.0. Fastest vision model tested with highest quality score.
# Requires ~15.9GB model + ~1.1GB mmproj. Context 32768 leaves headroom
# for concurrent image generation (stable-diffusion.cpp).
# Quality: 95.5% (A) | AGX Orin 64GB MAXN: 32.2 tok/s
# NOTE: Gemma 4 thinking content leaks into responses (llama.cpp issue as of
# April 2025). Monitor ggml-org/llama.cpp for fixes. Once resolved, this
# becomes the top recommendation (faster + higher quality than Qwen 3.5 MoE).
# Download:
#   hf download bartowski/google_gemma-4-26B-A4B-it-GGUF google_gemma-4-26B-A4B-it-Q4_K_M.gguf --local-dir /var/lib/llama-cpp/models/
#   hf download bartowski/google_gemma-4-26B-A4B-it-GGUF mmproj-google_gemma-4-26B-A4B-it-f16.gguf --local-dir /var/lib/llama-cpp/models/
#MODEL="/var/lib/llama-cpp/models/google_gemma-4-26B-A4B-it-Q4_K_M.gguf"
#TEMPLATE=
#REASONING_FORMAT=deepseek
#MMPROJ="/var/lib/llama-cpp/models/mmproj-google_gemma-4-26B-A4B-it-f16.gguf"

# ==============================================================================
# After changing presets, restart the service:
#   sudo systemctl restart llama-server
#
# For Thinking mode, also add to dawn.toml:
#   [llm.thinking]
#   mode = "enabled"
#   budget_tokens = 5000
# ==============================================================================

# Environment variables (Jetson-specific CUDA settings)
GGML_CUDA_NO_VMM=1
GGML_CUDA_FORCE_MMQ=1

# Server options
PORT=8080
HOST=127.0.0.1
GPU_LAYERS=99

# CRITICAL PARAMETERS (affect quality - do not change without testing)
# Batch 768 achieves 84.8% quality (vs 18% at 256, 56% at 512)
# For Presets D-G (vision models): use CONTEXT_SIZE=32768, BATCH_SIZE=768
CONTEXT_SIZE=8192
BATCH_SIZE=768
UNBATCH_SIZE=768

# Sampling Parameters
# Qwen (Presets A/B/C/E/F): temp=0.7, top_p=0.8, top_k=20, min_p=0
# Gemma 4 (Presets D/G):    temp=1.0, top_p=0.95, top_k=64, min_p=0
THREADS=4
CACHE_TYPE_K=q8_0
CACHE_TYPE_V=q8_0
TEMPERATURE=0.7
TOP_P=0.8
TOP_K=20
MIN_P=0
REPEAT_PENALTY=1.1

# Speculative decoding - DO NOT USE FOR DAWN
# Testing showed 40% SLOWER for DAWN's use case (long prompts, short responses)
# DRAFT_MODEL="/var/lib/llama-cpp/models/Qwen3-0.6B-Q8_0.gguf"
