# ==============================================================================
# After changing presets, restart the service:
#   sudo systemctl restart llama-server
#
# For Thinking mode, also add to dawn.toml:
#   [llm.thinking]
#   mode = "enabled"
#   budget_tokens = 5000
# ==============================================================================

# Environment variables (Jetson-specific CUDA settings)
GGML_CUDA_NO_VMM=1
GGML_CUDA_FORCE_MMQ=1

# Server options
PORT=8080
HOST=127.0.0.1
GPU_LAYERS=99

# CRITICAL PARAMETERS (affect quality - do not change without testing)
# Batch 768 achieves 84.8% quality (vs 18% at 256, 56% at 512)
# For Presets D-G (large vision models): use CONTEXT_SIZE=32768, BATCH_SIZE=768
CONTEXT_SIZE=8192
BATCH_SIZE=768
UNBATCH_SIZE=768

# Sampling Parameters
# Qwen (Presets A/A2/B/E/F):    temp=0.7, top_p=0.8, top_k=20, min_p=0
# Gemma (Presets A3/C/D/G):     temp=1.0, top_p=0.95, top_k=64, min_p=0
THREADS=4
CACHE_TYPE_K=q8_0
CACHE_TYPE_V=q8_0
TEMPERATURE=0.7
TOP_P=0.8
TOP_K=20
MIN_P=0
REPEAT_PENALTY=1.1

# Speculative decoding - DO NOT USE FOR DAWN
# Testing showed 40% SLOWER for DAWN's use case (long prompts, short responses)
# DRAFT_MODEL="/var/lib/llama-cpp/models/Qwen3-0.6B-Q8_0.gguf"
