# Llama.cpp Server Configuration for DAWN
# Updated: April 2025
#
# See README.md for full documentation
#
# IMPORTANT: Set power mode to MAXN for best performance on AGX Orin 64GB:
#   sudo nvpmodel -m 0 && sudo jetson_clocks

# ==============================================================================
# MODEL SELECTION - Choose ONE preset by uncommenting MODEL and REASONING_FORMAT
# ==============================================================================

# --- PRESET A: Qwen3 4B Instruct (default) ---
# Fast responses, no vision. Best for voice on constrained hardware.
# Quality: 94.8% (A) | AGX Orin 64GB MAXN: 35.1 tok/s | 30W: 10.4 tok/s
# Download:
#   hf download bartowski/Qwen_Qwen3-4B-Instruct-2507-GGUF Qwen_Qwen3-4B-Instruct-2507-Q4_K_M.gguf --local-dir /var/lib/llama-cpp/models/
MODEL="/var/lib/llama-cpp/models/Qwen3-4B-Instruct-2507-Q4_K_M.gguf"
TEMPLATE="/var/lib/llama-cpp/templates/qwen3_chatml.jinja"
REASONING_FORMAT=none
MMPROJ=

# --- PRESET A2: Qwen3.5 4B Vision ---
# Hybrid SSM+Transformer with vision. Slightly slower than Qwen3 4B.
# Quality: 90.5% (A) | AGX Orin 64GB MAXN: 28.4 tok/s
# Download:
#   hf download bartowski/Qwen_Qwen3.5-4B-GGUF Qwen_Qwen3.5-4B-Q4_K_M.gguf --local-dir /var/lib/llama-cpp/models/
#   hf download bartowski/Qwen_Qwen3.5-4B-GGUF mmproj-Qwen_Qwen3.5-4B-f16.gguf --local-dir /var/lib/llama-cpp/models/
#MODEL="/var/lib/llama-cpp/models/Qwen_Qwen3.5-4B-Q4_K_M.gguf"
#TEMPLATE=
#REASONING_FORMAT=deepseek
#MMPROJ="/var/lib/llama-cpp/models/mmproj-Qwen_Qwen3.5-4B-f16.gguf"

# --- PRESET A3: Gemma 3 4B Vision ⭐ RECOMMENDED for Orin 16GB ---
