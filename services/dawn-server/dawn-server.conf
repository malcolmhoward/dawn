# DAWN Server Environment Configuration
#
# This file is loaded by systemd as an EnvironmentFile.
# Edit and restart: sudo systemctl restart dawn-server

# Library path (Jetson-specific CUDA paths)
LD_LIBRARY_PATH=/usr/local/lib:/usr/local/cuda/lib64:/usr/lib/aarch64-linux-gnu/tegra

# CUDA device selection
CUDA_VISIBLE_DEVICES=0

# Home directory for the service
HOME=/var/lib/dawn

# Uncomment to limit CUDA memory (useful if sharing GPU with llama-server):
#CUDA_MEM_POOL_SIZE=256MB
