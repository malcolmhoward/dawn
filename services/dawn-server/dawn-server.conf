# DAWN Server Environment Configuration
#
# This file is loaded by systemd as an EnvironmentFile.
# Edit and restart: sudo systemctl restart dawn-server

# Library path (always include /usr/local/lib for ONNX Runtime, espeak-ng, piper-phonemize)
LD_LIBRARY_PATH=/usr/local/lib

# Home directory for the service
HOME=/var/lib/dawn

# ── Jetson CUDA (uncomment on Jetson with GPU) ──
# Adds CUDA and Tegra library paths for GPU-accelerated Whisper ASR.
# Not needed on Raspberry Pi or x86_64 CPU-only systems.
#LD_LIBRARY_PATH=/usr/local/lib:/usr/local/cuda/lib64:/usr/lib/aarch64-linux-gnu/tegra
#CUDA_VISIBLE_DEVICES=0
#CUDA_MEM_POOL_SIZE=256MB
