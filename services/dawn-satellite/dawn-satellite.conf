# DAWN Satellite Environment Configuration
#
# This file is loaded by systemd as an EnvironmentFile.
# Edit and restart: sudo systemctl restart dawn-satellite

# Library path (for Piper, ONNX Runtime, Vosk, etc.)
LD_LIBRARY_PATH=/usr/local/lib

# Home directory - identity file resolves to $HOME/.dawn_satellite_identity
HOME=/var/lib/dawn-satellite

# SDL video driver for headless (no display) operation
# Uncomment for RPi with touchscreen display:
#SDL_VIDEODRIVER=KMSDRM

# Uncomment to force a specific ALSA card (if auto-detection fails):
#AUDIODEV=plughw:0,0
