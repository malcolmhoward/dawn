<!doctype html>
<html lang="en">
   <head>
      <meta charset="UTF-8" />
      <!-- CSP is set via HTTP header (webui_add_security_headers) -->
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <meta name="theme-color" content="#22d3ee" />
      <title>DAWN - Login</title>
      <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
      <link rel="stylesheet" href="/css/main.css" />
      <link rel="stylesheet" href="/css/login.css" />
   </head>
   <body>
      <div class="login-container">
         <div class="login-header">
            <div class="login-logo">D.A.W.N.</div>
            <div class="login-subtitle">Digital Assistant for Workflow Neural-inference</div>
         </div>

         <form class="login-form" id="login-form" autocomplete="on">
            <div class="error-message" id="error-message"></div>

            <div class="form-group">
               <label class="form-label" for="username">Username</label>
               <input
                  type="text"
                  class="form-input"
                  id="username"
                  name="username"
                  autocomplete="username"
                  placeholder="Enter username"
                  required
                  autofocus
               />
            </div>

            <div class="form-group">
               <label class="form-label" for="password">Password</label>
               <input
                  type="password"
                  class="form-input"
                  id="password"
                  name="password"
                  autocomplete="current-password"
                  placeholder="Enter password"
                  required
               />
            </div>

            <div class="form-group remember-me">
               <label class="checkbox-label">
                  <input type="checkbox" id="remember-me" name="remember_me" />
                  <span class="checkbox-text">Remember me on this device</span>
               </label>
            </div>

            <button type="submit" class="login-btn" id="login-btn">Sign In</button>
         </form>

         <div class="version-info" id="version-info">Loading...</div>
      </div>

      <script src="/js/login.js"></script>
   </body>
</html>
