# Model-Specific Configuration for llama-server
# Updated: April 2025
#
# Each model has optimized settings based on:
# - HuggingFace model card recommendations
# - llama.cpp best practices
# - Empirical testing results (see llm_testing/docs/MODEL_TEST_ANALYSIS.md)
#
# IMPORTANT: Jetson AGX Orin must be in MAXN power mode for rated speeds:
#   sudo nvpmodel -m 0 && sudo jetson_clocks
#
# All speeds measured on Jetson AGX Orin 64GB at MAXN (60W) unless noted.
#
# RECOMMENDED (voice, no vision): Qwen3-4B-Instruct-2507-Q4_K_M (bartowski)
#   - Quality: 94.8% (A grade) | Speed: 35.1 tok/s
#
# RECOMMENDED (voice + vision, 64GB): Qwen_Qwen3.5-35B-A3B-Q4_K_M ⭐
#   - Quality: 94.8% (A grade) | Speed: 29.6 tok/s | MoE 3B/35B
#
# RECOMMENDED (voice + vision, 16GB): Gemma 3 4B IT ⭐
#   - Quality: 89.7% (B grade) | Speed: 36.3 tok/s (64GB) | 13.9 tok/s (16GB 28W)
#
# PENDING (blocked on thinking leak):
#   Gemma 4 26B-A4B: 94.8% (A), 32.2 tok/s — monitor ggml-org/llama.cpp
#   Gemma 4 31B: 100% (A), 6.8 tok/s — highest quality but slow + thinking leaks
#
# SPECULATIVE DECODING: DO NOT USE FOR DAWN
#   - Testing showed 40% SLOWER with DAWN's prompt structure
#   - Long system prompt (90 tokens) + short responses = worst case for spec decoding
#   - See MODEL_TEST_ANALYSIS.md for full analysis

# Format: MODEL_NAME|gpu_layers|context|batch|ubatch|threads|temp|top_p|top_k|repeat_penalty|extra_flags

