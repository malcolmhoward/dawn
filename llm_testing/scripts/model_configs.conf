# Qwen3-4B-Instruct-2507-Q4_K_M (bartowski quant)
# - HuggingFace: bartowski/Qwen_Qwen3-4B-Instruct-2507-GGUF
# - Quality: 94.8% (A) @ 35.1 tok/s on AGX Orin 64GB MAXN
# - TTFT: 659ms cold, 95ms warm (~1000 token prompt) — best prompt caching
# - (Previous unsloth quant scored 84.8% (B) @ 15.2 tok/s on Orin 16GB)
# - Qwen recommended: temp=0.7, top_p=0.8, top_k=20, min_p=0.0
# - Context 16384: DAWN's system prompt + tools + memory + conversation needs ~6.6k baseline
Qwen_Qwen3-4B-Instruct-2507-Q4_K_M.gguf|99|16384|768|768|4|0.7|0.8|20|1.1|--flash-attn on --min-p 0

